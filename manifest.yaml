meta:
  name: tempo
  version: 1.0.1
  description: Per-span SLO checks against Grafana Tempo. Use for "p99 of <span> stays under <target>" invariants.
  tags: [tracing, otel, grafana, slo]
  requires:
    mgtt: ">=0.2.0"

# Capabilities the provider needs at probe time — host packages
# and credential chains. Image installs satisfy these via docker-run
# bind mounts and env forwards; git installs inherit them from the
# operator's shell. `network_mode:` is a separate runtime-isolation knob.
# See mgtt docs/reference/image-capabilities.md for the vocabulary.
#
# Backend version this provider is built against. Tempo's TraceQL Metrics
# response shape and TraceQL syntax both shifted between minor versions —
# the contract here is a hard binding, not best-effort.
runtime:
  backends:
    tempo: ">=2.6.0 <2.7.0"
  network_mode: host

install:
  source:
    build: hooks/install.sh
    clean: hooks/uninstall.sh
  image:
    repository: ghcr.io/mgt-tool/mgtt-provider-tempo

variables:
  tempo_url:
    description: base URL of the Tempo HTTP API (e.g. https://tempo.observability.svc:3200)
    required: true
  auth_token:
    description: bearer token for Tempo when fronted by auth (optional)
    required: false
  tenant_id:
    description: X-Scope-OrgID for multi-tenant Tempo deployments (optional)
    required: false
  span_filter:
    description: |
      optional TraceQL attribute matcher appended to every query — e.g.
      `resource.deployment.color = "green"` to scope an SLO to one
      blue/green color, or `span.http.target = "/checkout"` to a single route
    required: false
