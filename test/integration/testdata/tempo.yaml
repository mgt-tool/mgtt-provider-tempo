# Single-binary Tempo 2.6 config for integration tests. Spans flow:
#   OTLP/HTTP → distributor → ingester (storage) AND metrics_generator
#                                       → local-blocks processor (TraceQL Metrics)
#
# The local-blocks processor is what makes /api/metrics/query_range return
# real samples. flush_to_storage:true keeps queries returning data after the
# in-memory window rolls.

target: all
multitenancy_enabled: false

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 1s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
    # Default is 5m — way too slow for tests. Poll every second so the
    # querier sees freshly-flushed local-blocks immediately.
    blocklist_poll: 1s

query_frontend:
  metrics:
    max_duration: 24h

querier:
  max_concurrent_queries: 4

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: integration-test
  storage:
    path: /var/tempo/generator/wal
    # local-blocks doesn't need remote_write itself, but the metrics_generator
    # module won't fully come up without a valid storage target. Use a dummy
    # URL — write attempts will fail but local-blocks queries still work.
    remote_write:
      - url: http://localhost:9999/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    local_blocks:
      flush_to_storage: true
      filter_server_spans: false
      # Test-tuned: roll WAL into queryable blocks aggressively so probes
      # see data within seconds, not minutes.
      trace_idle_period: 1s
      max_block_duration: 5s
      flush_check_period: 1s

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
      generate_native_histograms: both
