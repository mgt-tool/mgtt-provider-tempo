# Single-binary Tempo config for integration tests. No clustering, no
# auth, no S3 — just enough to ingest OTLP spans and serve TraceQL Metrics.

target: all
multitenancy_enabled: false

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 1s    # flush quickly so probes see the spans
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Enable the TraceQL Metrics endpoint (/api/metrics/query_range) — that's
# what mgtt-provider-tempo queries.
query_frontend:
  metrics:
    max_duration: 24h

querier:
  max_concurrent_queries: 4

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
