# A real Magento storefront, watched the way an SRE on call thinks about it.
#
# Two failure modes this provider catches that flat latency dashboards miss:
#   • slowness that *persists* — distinguishing a 30-second blip from a
#     real degradation worth waking someone for (breach_duration)
#   • span-level error rate — application errors caught in code, not just
#     the HTTP 5xx envelope (error_rate_5m)
#
# Each component below is a three-number contract per customer-visible
# operation:
#   • target_max                 — latency budget (e.g. 800ms)
#   • target_max_error_rate      — error budget (e.g. 0.001 = 0.1% of spans)
#   • breach_tolerance_seconds   — how long p99 may sit above target_max
#                                  before the SLO is considered breached
# The type manifest's `healthy:` and `states:` reference these vars, so
# tightening or loosening any scenario means changing one number here.
#
# Usage:
#   export MGTT_MODEL=examples/magento-platform.model.yaml
#   mgtt plan --component checkout_init_slo

meta:
  name: magento-storefront
  version: "1.0"
  providers:
    - kubernetes
    - aws
    - tempo
  vars:
    namespace: magento
    tempo_url: http://tempo.observability.svc:3200
    color: blue

components:
  # ── The infrastructure these requests run through ──────────────────────
  php_fpm:
    type: kubernetes.deployment
    vars: {name: magento-php-fpm-blue}

  # The Service whose selector flip *is* the blue/green promotion. The
  # post_switch_canary SLO depends on this so a stuck switch surfaces both
  # at the kubernetes layer and at the latency layer.
  magento_svc:
    type: kubernetes.service
    vars: {name: magento-svc, namespace: "{namespace}"}

  rds:
    type: aws.rds_instance
    providers: [aws]
    vars: {identifier: magento-prod}

  redis:
    type: aws.elasticache_cluster
    providers: [aws]
    vars: {identifier: magento-redis}

  opensearch:
    type: aws.opensearch_domain
    providers: [aws]
    vars: {identifier: magento-search}

  # ── Per-customer-operation SLOs ────────────────────────────────────────
  # One component per named span an operator cares about. depends_on wires
  # the SLO to the infrastructure it leans on, so when the SLO breaches,
  # mgtt walks downstream and asks each dependency what's wrong.

  # The most-walked page on the storefront. Slow here = revenue lost on
  # everything that follows. Standard error budget; tolerate brief spikes
  # since cache warm-ups produce normal short breaches.
  catalog_browse_slo:
    type: tracing.span_invariant
    providers: [tempo]
    vars:
      tempo_url: "{tempo_url}"
      span: "http.server.catalog_view"
      target_max: 2s
      target_max_error_rate: 0.01           # 1% errors tolerated
      breach_tolerance_seconds: 300         # 5 min sustained = breach
    depends_on: [php_fpm, opensearch, redis]

  # The "is the customer committing?" signal. Sub-second target — slower
  # than this and abandonment climbs sharply. Tighter on errors than browse.
  add_to_cart_slo:
    type: tracing.span_invariant
    providers: [tempo]
    vars:
      tempo_url: "{tempo_url}"
      span: "cart.add"
      target_max: 500ms
      target_max_error_rate: 0.005          # 0.5% errors
      breach_tolerance_seconds: 60          # 1 min sustained
    depends_on: [php_fpm, rds, redis]

  # The revenue gate. Tightest budgets in the model — every second of
  # breach is conversion bleeding out.
  checkout_init_slo:
    type: tracing.span_invariant
    providers: [tempo]
    vars:
      tempo_url: "{tempo_url}"
      span: "checkout.init"
      target_max: 800ms
      target_max_error_rate: 0.001          # 0.1% errors
      breach_tolerance_seconds: 30          # 30s sustained = page someone
    depends_on: [php_fpm, rds, redis]

  # Discovery latency. Looser error budget — search timeouts on long-tail
  # queries are normal — and longer breach tolerance since OpenSearch
  # warm-up windows can produce minutes-long latency bumps.
  search_query_slo:
    type: tracing.span_invariant
    providers: [tempo]
    vars:
      tempo_url: "{tempo_url}"
      span: "catalog.search"
      target_max: 1s
      target_max_error_rate: 0.02           # 2% errors
      breach_tolerance_seconds: 600         # 10 min sustained
    depends_on: [php_fpm, opensearch]

  # ── The deployment canary ──────────────────────────────────────────────
  # The blue/green switch *is* the canary. After magento_svc flips its
  # selector to {color}, the just-promoted color must hold a tighter error
  # budget than steady-state — otherwise the deploy is bad and rollback is
  # the right move. span_filter scopes this SLO to one color so the dying
  # blue pods don't contaminate the signal.
  #
  # Latency budget is *looser* than steady-state checkout (3s vs 800ms) —
  # a fresh fleet runs cold for a few minutes and that's expected. But the
  # error budget is *tighter* (0.5% vs 0.1%) and breach tolerance is *zero*
  # (any sustained breach in the canary window is a fail).
  post_switch_canary:
    type: tracing.span_invariant
    providers: [tempo]
    vars:
      tempo_url: "{tempo_url}"
      span: "http.server.request"
      span_filter: 'resource.deployment.color = "{color}"'
      target_max: 3s
      target_max_error_rate: 0.005
      breach_tolerance_seconds: 0
    depends_on: [magento_svc, php_fpm]
